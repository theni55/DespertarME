{% extends "base.html" %}
{% block title %}Entrar — DespertarME Admin{% endblock %}
{% block body %}
<main id="main-content">
<form method="post" action="/admin/login">
    <h2>DespertarME Admin</h2>
    <label for="admin-login-email">Email</label>
    <input id="admin-login-email" type="email" name="email" autocomplete="email" required>
    <label for="admin-login-password">Contraseña</label>
    <input id="admin-login-password" type="password" name="password" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
    {% if detail %}<p class="error" role="alert">{{ detail }}</p>{% endif %}
</form>
</main>
{% endblock %}
