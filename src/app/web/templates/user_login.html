{% extends "base.html" %}
{% block title %}Entrar — DespertarME{% endblock %}
{% block body %}
<main id="main-content">
<form method="post" action="/app/login">
    <h2>DespertarME</h2>
    <p class="subtitle">Avisador de alertas deportivas</p>
    <label for="login-email">Email</label>
    <input id="login-email" type="email" name="email" autocomplete="email" required>
    <label for="login-password">Contraseña</label>
    <input id="login-password" type="password" name="password" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
    <p style="text-align: center; margin-top: 16px;">
        ¿No tienes cuenta? <a href="/app/register">Registrarme</a>
    </p>
</form>
</main>
{% endblock %}
