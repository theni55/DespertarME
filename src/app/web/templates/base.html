<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block description %}DespertarME — avisador de alertas deportivas en tiempo real (MMA/Boxeo/Tenis).{% endblock %}">
    {% block meta_extra %}{% endblock %}
    <meta name="theme-color" content="#0b0d12">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <title>{% block title %}DespertarME{% endblock %}</title>
    <link rel="preload" href="/static/fonts/inter-var-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body class="{% block body_class %}{% endblock %}">
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
    {% block body %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
