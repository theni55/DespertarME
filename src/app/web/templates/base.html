<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DespertarME Admin{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root { --bg: #0f1117; --card: #1a1d29; --text: #e0e0e0; --accent: #6c8aff; --danger: #ff6b6b; --ok: #4ecdc4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .nav { display: flex; gap: 20px; align-items: center; padding: 12px 20px; background: var(--card); border-radius: 8px; margin-bottom: 20px; }
        .nav h1 { font-size: 1.2rem; margin-right: auto; }
        .nav a { color: var(--text); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; }
        .card h3 { font-size: 0.85rem; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .card .num { font-size: 2rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #2a2d3a; font-size: 0.9rem; }
        th { color: var(--accent); font-weight: 600; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge.fired { background: #1a4a3a; color: var(--ok); }
        .badge.failed { background: #4a1a1a; color: var(--danger); }
        .badge.active { background: #1a3a4a; color: var(--accent); }
        .badge.admin { background: #4a3a1a; color: #ffd700; }
        .badge.user { background: #2a2d3a; color: var(--text); }
        .fight { display: flex; align-items: center; gap: 12px; }
        .fighter { display: flex; align-items: center; gap: 8px; min-width: 150px; }
        .fighter.blue { flex-direction: row-reverse; text-align: right; }
        .fighter img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; object-position: top; background: #2a2d3a; border: 2px solid #2a2d3a; flex-shrink: 0; }
        .fighter.red img { border-color: #b3423f; }
        .fighter.blue img { border-color: #3f6cb3; }
        .fighter .name { font-weight: 600; font-size: 0.9rem; }
        .vs { color: #888; font-size: 0.75rem; font-weight: 700; }
        form { max-width: 360px; margin: 40px auto; background: var(--card); padding: 32px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #333; border-radius: 4px; background: var(--bg); color: var(--text); }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .error { color: var(--danger); text-align: center; margin-top: 12px; }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
