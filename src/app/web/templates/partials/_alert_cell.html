{# Celda "Alerta" de la cartelera — reutilizada en render normal e HTMX (Fase 4). #}
{% if b.id in existing_bout_ids %}
<span class="badge fired">✓ Alerta activa</span>
{% else %}
<form method="post" action="/app/subscriptions/create" class="inline-alert-form"
      hx-post="/app/subscriptions/create" hx-target="#bout-row-{{ b.id }} td:last-child" hx-swap="innerHTML">
    <input type="hidden" name="event_id" value="{{ event.id }}">
    <input type="hidden" name="event_name" value="{{ event.name }}">
    <input type="hidden" name="bout_id" value="{{ b.id }}">
    <input type="hidden" name="target_match_number" value="{{ b.match_number }}">
    <input type="number" name="lead_minutes" value="15" min="1" max="120" aria-label="Minutos de antelación">
    <span class="text-muted" style="font-size: 0.8rem;">min</span>
    <button type="submit" class="btn-sm btn-ok">Avisar</button>
</form>
{% endif %}
