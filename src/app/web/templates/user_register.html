{% extends "base.html" %}
{% block title %}Registro — DespertarME{% endblock %}
{% block body %}
<form method="post" action="/app/register">
    <h2 style="margin-bottom: 20px;">Crear cuenta</h2>
    <input type="email" name="email" placeholder="email" required>
    <input type="password" name="password" placeholder="contraseña (mín 8 caracteres)" minlength="8" required>
    <input type="tel" name="phone" placeholder="teléfono (ej: +34600000000)">
    <button type="submit">Registrarme</button>
    <p style="text-align: center; margin-top: 16px;">
        ¿Ya tienes cuenta? <a href="/app/login">Entrar</a>
    </p>
</form>
{% endblock %}
